<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Login / Pulse</title>
    <link rel="stylesheet" href="assets/css/base.css"/>
    <link rel="stylesheet" href="assets/css/layout.css"/>
    <link rel="stylesheet" href="assets/css/components.css"/>
    <link rel="stylesheet" href="assets/css/responsive.css"/>
  </head>
  <body class="auth-page">
    <main class="auth-container" style="flex-direction:column;align-items:center;max-width:440px;margin:0 auto;">
 
      <!-- Logo + name -->
      <div style="text-align:center;margin-bottom:32px;">
        <svg viewBox="0 0 24 24" fill="#8b5cf6" style="width:48px;height:48px;margin:0 auto 12px;">
          <path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13L13 2Z"/>
        </svg>
        <h1 style="font-size:28px;font-weight:800;color:#f0eeff;">Pulse</h1>
        <p style="color:#6b6b8a;font-size:14px;margin-top:6px;">Feel what's happening right now</p>
      </div>
 
      <div style="width:100%;">
        <h2 style="font-size:22px;font-weight:700;margin-bottom:24px;color:#f0eeff;">Welcome back</h2>
        <form id="loginForm" class="auth-form" novalidate style="max-width:100%;">
          <div class="form-group">
            <input type="text" id="loginEmail" class="form-input" placeholder=" " required/>
            <label for="loginEmail" class="form-label">Email or username</label>
          </div>
          <div class="form-group">
            <input type="password" id="loginPassword" class="form-input" placeholder=" " required/>
            <label for="loginPassword" class="form-label">Password</label>
          </div>
          <button type="submit" class="btn btn-primary btn-full" style="margin-top:8px;">Log in</button>
        </form>
 
        <!-- Demo hint -->
        <div style="margin-top:20px;padding:14px;background:#13131a;border:1px solid #1e1e2e;border-radius:12px;">
          <p style="font-size:12px;color:#6b6b8a;margin-bottom:8px;font-weight:600;">DEMO ACCOUNTS (password: demo123)</p>
          <div style="display:flex;flex-wrap:wrap;gap:6px;">
            <code style="font-size:11px;background:#1e1e2e;color:#8b5cf6;padding:3px 8px;border-radius:6px;">layla@pulse.app</code>
            <code style="font-size:11px;background:#1e1e2e;color:#8b5cf6;padding:3px 8px;border-radius:6px;">omar@pulse.app</code>
            <code style="font-size:11px;background:#1e1e2e;color:#8b5cf6;padding:3px 8px;border-radius:6px;">sara@pulse.app</code>
          </div>
        </div>
 
        <div class="auth-footer" style="text-align:center;margin-top:20px;">
          <p>New to Pulse? <a href="register.html" style="color:#8b5cf6;font-weight:600;">Create account</a></p>
        </div>
      </div>
    </main>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/seed.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
</html>
