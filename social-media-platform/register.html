<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign up / X</title>
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
  </head>
  <body class="auth-page">
    <main class="auth-container">
      <div class="auth-left">
        <svg class="logo-x" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/>
        </svg>
      </div>
      <div class="auth-right">
        <h1 class="auth-subtitle">Create your account</h1>
        <form id="registerForm" class="auth-form" novalidate>
          <div class="form-group">
            <input type="text" id="regName" name="name" class="form-input" placeholder=" " required/>
            <label for="regName" class="form-label">Name</label>
          </div>
          <div class="form-group">
            <input type="text" id="regUsername" name="username" class="form-input" placeholder=" " required/>
            <label for="regUsername" class="form-label">Username</label>
          </div>
          <div class="form-group">
            <input type="email" id="regEmail" name="email" class="form-input" placeholder=" " required/>
            <label for="regEmail" class="form-label">Email</label>
          </div>
          <div class="form-group">
            <input type="password" id="regPassword" name="password" class="form-input" placeholder=" " required/>
            <label for="regPassword" class="form-label">Password</label>
          </div>
          <button type="submit" class="btn btn-primary btn-full btn-lg">Create account</button>
        </form>
        <div class="auth-footer">
          <p>Already have an account? <a href="login.html">Log in</a></p>
        </div>
      </div>
    </main>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/auth.js"></script>
  </body>
</html>
