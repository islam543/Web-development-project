// ================================================================
// ALL APP LOGIC INLINE - NO EXTERNAL JS FILES NEEDED
// ================================================================

var APP_USERS_KEY   = "smp_users";
var APP_POSTS_KEY   = "smp_posts";
var APP_SESSION_KEY = "smp_currentUser";
var APP_SEEDED_KEY  = "smp_seeded3";
var VIBES = ["🔥","💀","💯","👀","🫶"];

// ── Storage helpers ──────────────────────────────────────────
function getUsers() { try { return JSON.parse(localStorage.getItem(APP_USERS_KEY))||[]; } catch(e){return[];} }
function getPosts() { try { return JSON.parse(localStorage.getItem(APP_POSTS_KEY))||[]; } catch(e){return[];} }
function saveUsers(a) { localStorage.setItem(APP_USERS_KEY,JSON.stringify(a)); }
function savePosts(a) { localStorage.setItem(APP_POSTS_KEY,JSON.stringify(a)); }
function getUserById(id) { return getUsers().find(function(u){return u.id===id;})||null; }
function getSession() { return localStorage.getItem(APP_SESSION_KEY); }
function escapeHtml(s) { return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function formatTime(ts) {
  var diff=Math.floor((Date.now()-ts)/1000);
  if(diff<60) return diff+"s";
  if(diff<3600) return Math.floor(diff/60)+"m";
  if(diff<86400) return Math.floor(diff/3600)+"h";
  return new Date(ts).toLocaleDateString("en-US",{month:"short",day:"numeric"});
}
function avatarGrad(id) {
  var p=["linear-gradient(135deg,#8b5cf6,#6d28d9)","linear-gradient(135deg,#f43f5e,#e11d48)",
    "linear-gradient(135deg,#10b981,#059669)","linear-gradient(135deg,#f59e0b,#d97706)",
    "linear-gradient(135deg,#3b82f6,#2563eb)","linear-gradient(135deg,#ec4899,#db2777)"];
  var h=0; for(var i=0;i<(id||"").length;i++) h=id.charCodeAt(i)+((h<<5)-h);
  return p[Math.abs(h)%p.length];
}
function makeAv(user,sz) {
  sz=sz||40;
  var bg=avatarGrad(user.id);
  var inner=(user.profilePic&&user.profilePic.length>3)
    ? '<img src="'+user.profilePic+'" style="width:100%;height:100%;border-radius:50%;object-fit:cover;" onerror="this.style.display=\'none\'">'
    : '<span style="font-size:'+Math.round(sz*0.38)+'px;font-weight:800;color:#fff;">'+user.name[0].toUpperCase()+'</span>';
  return '<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+bg+';display:flex;align-items:center;justify-content:center;flex-shrink:0;overflow:hidden;">'+inner+'</div>';
}

seedData();

// ── Auth check ───────────────────────────────────────────────
if(!getSession()) { location.href="login.html"; }
var ME = getUserById(getSession());
if(!ME) { location.href="login.html"; }

// ── Sidebar ──────────────────────────────────────────────────
function buildSidebar() {
  var el=document.getElementById("appSidebar"); if(!el) return;
  var pc=getPosts().filter(function(p){return p.authorId===ME.id;}).length;
  var bg=avatarGrad(ME.id);
  el.innerHTML=
    '<div class="sidebar-logo"><a href="feed.html"><svg viewBox="0 0 24 24" fill="#8b5cf6" style="width:28px;height:28px"><path d="M13 2L4.5 13.5H11L10 22L19.5 10.5H13Z"/></svg></a></div>'
    +'<nav class="sidebar-nav">'
    +'<a href="feed.html" class="nav-item active"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M21.591 7.146L12.52 1.157c-.316-.21-.724-.21-1.04 0l-9.071 5.99c-.26.173-.409.456-.409.757v13.183c0 .502.418.913.929.913h6.638c.511 0 .929-.41.929-.913v-7.075h3.008v7.075c0 .502.418.913.929.913h6.638c.511 0 .929-.41.929-.913V7.904c0-.301-.158-.584-.409-.758z"/></svg><span>Home</span></a>'
    +'<a href="profile.html?id='+ME.id+'" class="nav-item"><svg viewBox="0 0 24 24"><path fill="currentColor" d="M5.651 19h12.698c-.337-1.8-1.023-3.21-1.945-4.19C15.318 13.65 13.838 13 12 13s-3.317.65-4.404 1.81c-.922.98-1.608 2.39-1.945 4.19zm.486-5.56C7.627 11.85 9.648 11 12 11s4.373.85 5.863 2.44c1.477 1.58 2.366 3.8 2.632 6.46l.11 1.1H3.395l.11-1.1c.266-2.66 1.155-4.88 2.632-6.46zM12 4c-1.105 0-2 .9-2 2s.895 2 2 2 2-.9 2-2-.895-2-2-2zM8 6c0-2.21 1.791-4 4-4s4 1.79 4 4-1.791 4-4 4-4-1.79-4-4z"/></svg><span>Profile</span></a>'
    +'</nav>'
    +'<a href="feed.html" class="nav-post-btn"><span>Pulse it</span></a>'
    +'<a href="profile.html?id='+ME.id+'" class="sidebar-profile">'+makeAv(ME,40)
    +'<div class="sidebar-profile-info"><div class="sidebar-profile-name">'+escapeHtml(ME.name)+'</div>'
    +'<div class="sidebar-profile-handle">@'+escapeHtml(ME.username)+' &middot; '+pc+' pulses</div></div></a>'
    +'<button id="logoutBtn" style="margin:8px;width:calc(100% - 16px);background:transparent;border:1px solid var(--color-border);color:var(--color-text-secondary);border-radius:9999px;padding:10px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;">Log out</button>';

buildSidebar();

// ── Render post ──────────────────────────────────────────────
function vibeBar(post) {
  var myV=(post.vibes||{})[ME.id]||null;
  var counts={};
  VIBES.forEach(function(e){counts[e]=0;});
  Object.values(post.vibes||{}).forEach(function(e){if(counts[e]!==undefined)counts[e]++;});
  var total=Object.keys(post.vibes||{}).length;
  var topE=null,topN=0;
  VIBES.forEach(function(e){if(counts[e]>topN){topN=counts[e];topE=e;}});
  var pills=VIBES.map(function(e){
    var n=counts[e]; var act=myV===e;
    return '<button onclick="doVibe(\''+post.id+'\',\''+e+'\');event.stopPropagation()" style="background:'+(act?'rgba(139,92,246,0.2)':'transparent')+';border:1px solid '+(act?'#8b5cf6':'var(--color-border)')+';color:'+(act?'#8b5cf6':'var(--color-text-secondary)')+';border-radius:9999px;padding:3px 9px;font-size:13px;cursor:pointer;display:inline-flex;align-items:center;gap:3px;">'+e+(n>0?'<span style="font-size:11px">'+n+'</span>':'')+'</button>';
  }).join('');
  return '<div style="margin-top:8px;display:flex;flex-wrap:wrap;gap:4px;align-items:center;">'+pills+(total>0?'<span style="font-size:11px;color:var(--color-text-secondary);margin-left:4px">'+total+' vibe'+(total!==1?'s':'')+(topE?' &middot; '+topE:'')+'</span>':'')+'</div>';
}

function renderComments(post) {
  return (post.comments||[]).map(function(c){
    var ca=getUserById(c.authorId); if(!ca) return '';
    var bg=avatarGrad(ca.id);
    var del=c.authorId===ME.id?'<button onclick="delComment(\''+post.id+'\',\''+c.id+'\');event.stopPropagation()" style="margin-left:auto;background:none;border:none;color:var(--color-text-secondary);cursor:pointer;font-size:12px;">&#10005;</button>':'';
    return '<div id="cmt-'+c.id+'" style="display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--color-border);">'
      +'<div style="width:28px;height:28px;border-radius:50%;background:'+bg+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0;">'+ca.name[0].toUpperCase()+'</div>'
      +'<div style="flex:1;min-width:0;"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;"><span style="font-weight:700;font-size:13px;">'+escapeHtml(ca.name)+'</span><span style="color:var(--color-text-secondary);font-size:12px;">'+formatTime(c.timestamp)+'</span>'+del+'</div>'
      +'<div style="font-size:13px;margin-top:2px;">'+escapeHtml(c.text)+'</div></div></div>';
  }).join('');
}

function renderPost(post) {
  var author=getUserById(post.authorId); if(!author) return '';
  var bg=avatarGrad(author.id);
  var isOwn=post.authorId===ME.id;
  var expBadge=post.expiresAt?'<span style="font-size:11px;background:rgba(245,158,11,0.15);color:#f59e0b;border:1px solid rgba(245,158,11,0.3);border-radius:9999px;padding:1px 8px;margin-left:6px;">&#9203; '+expiryLabel(post)+'</span>':'';
  var delBtn=isOwn?'<button onclick="delPost(\''+post.id+'\');event.stopPropagation()" style="margin-left:auto;background:none;border:none;color:var(--color-text-secondary);cursor:pointer;font-size:14px;" onmouseover="this.style.color=\'#ef4444\'" onmouseout="this.style.color=\'var(--color-text-secondary)\'">&#10005;</button>':'';
  return '<article class="post-card" id="post-'+post.id+'" data-id="'+post.id+'" onclick="openPost(\''+post.id+'\')">'
    +'<a href="profile.html?id='+author.id+'" onclick="event.stopPropagation()" style="text-decoration:none;">'+makeAv(author,40)+'</a>'
    +'<div class="post-body">'
    +'<div class="post-header">'
    +'<a href="profile.html?id='+author.id+'" class="post-author" onclick="event.stopPropagation()">'+escapeHtml(author.name)+'</a>'
    +'<span class="post-handle">@'+escapeHtml(author.username)+'</span>'
    +'<span class="post-separator">&middot;</span>'
    +'<span class="post-time">'+formatTime(post.timestamp)+'</span>'
    +expBadge+delBtn+'</div>'
    +'<div class="post-content">'+escapeHtml(post.content)+'</div>'
    +'<div id="vb-'+post.id+'">'+vibeBar(post)+'</div>'
    +'<div class="post-actions">'
    +'<button class="post-action comment" onclick="toggleReply(\''+post.id+'\');event.stopPropagation()"><svg viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px"><path d="M1.751 10c0-4.42 3.584-8 8.005-8h4.366c4.49 0 8.129 3.64 8.129 8.13 0 2.96-1.607 5.68-4.196 7.11l-8.054 4.46v-3.69h-.067c-4.49.1-8.183-3.51-8.183-8.01zm8.005-6c-3.317 0-6.005 2.69-6.005 6 0 3.37 2.77 6.08 6.138 6.01l.351-.01h1.761v2.3l5.087-2.81c1.951-1.08 3.163-3.13 3.163-5.36 0-3.39-2.744-6.13-6.129-6.13H9.756z"/></svg>'
    +'<span id="rc-'+post.id+'">'+(post.comments||[]).length+'</span></button>'
    +'</div>'
    +'<div id="ci-'+post.id+'" style="display:none;margin-top:8px;border-top:1px solid var(--color-border);padding-top:8px;">'
    +'<div id="cl-'+post.id+'">'+renderComments(post)+'</div>'
    +'<div style="display:flex;gap:8px;margin-top:8px;" onclick="event.stopPropagation()">'
    +'<input id="ri-'+post.id+'" type="text" placeholder="Reply..." maxlength="280" style="flex:1;background:var(--color-bg-surface);border:1px solid var(--color-border);border-radius:9999px;padding:8px 14px;color:var(--color-text-primary);font-size:13px;outline:none;font-family:inherit;" onfocus="this.style.borderColor=\'#8b5cf6\'" onblur="this.style.borderColor=\'var(--color-border)\'"/>'
    +'<button onclick="submitReply(\''+post.id+'\');event.stopPropagation()" style="background:#8b5cf6;color:#fff;border:none;border-radius:9999px;padding:8px 16px;font-weight:700;font-size:13px;cursor:pointer;font-family:inherit;">Reply</button>'
    +'</div></div></div></article>';
}

function expiryLabel(post) {
  if(!post.expiresAt) return "Forever";
  var left=post.expiresAt-Date.now();
  if(left<=0) return "Expired";
  if(left<60000) return "<1m";
  if(left<3600000) return Math.ceil(left/60000)+"m left";
  if(left<86400000) return Math.ceil(left/3600000)+"h left";
  return Math.ceil(left/86400000)+"d left";
}

// ── Actions ──────────────────────────────────────────────────
function openPost(id) { location.href="post.html?id="+id; }

function doVibe(postId,emoji) {
  var posts=getPosts();
  var p=posts.find(function(x){return x.id===postId;}); if(!p) return;
  if(!p.vibes) p.vibes={};
  if(p.vibes[ME.id]===emoji) delete p.vibes[ME.id]; else p.vibes[ME.id]=emoji;
  savePosts(posts);
  var el=document.getElementById("vb-"+postId);
  if(el) el.innerHTML=vibeBar(p);
}

function toggleReply(id) {
  var el=document.getElementById("ci-"+id);
  if(el) el.style.display=el.style.display==="none"?"block":"none";
}

function submitReply(postId) {
  var inp=document.getElementById("ri-"+postId);
  var txt=inp?inp.value.trim():""; if(!txt) return;
  var posts=getPosts();
  var p=posts.find(function(x){return x.id===postId;}); if(!p) return;
  if(!p.comments) p.comments=[];
  var c={id:"c_"+Date.now(),authorId:ME.id,text:txt,timestamp:Date.now()};
  p.comments.push(c); savePosts(posts);
  var cl=document.getElementById("cl-"+postId);
  if(cl) cl.insertAdjacentHTML("beforeend",renderCommentSingle(c,postId));
  var rc=document.getElementById("rc-"+postId);
  if(rc) rc.textContent=p.comments.length;
  inp.value="";
}

function renderCommentSingle(c,postId) {
  var ca=getUserById(c.authorId); if(!ca) return '';
  var bg=avatarGrad(ca.id);
  var del=c.authorId===ME.id?'<button onclick="delComment(\''+postId+'\',\''+c.id+'\');event.stopPropagation()" style="margin-left:auto;background:none;border:none;color:var(--color-text-secondary);cursor:pointer;font-size:12px;">&#10005;</button>':'';
  return '<div id="cmt-'+c.id+'" style="display:flex;gap:8px;padding:8px 0;border-bottom:1px solid var(--color-border);">'
    +'<div style="width:28px;height:28px;border-radius:50%;background:'+bg+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;color:#fff;flex-shrink:0;">'+ca.name[0].toUpperCase()+'</div>'
    +'<div style="flex:1;min-width:0;"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;"><span style="font-weight:700;font-size:13px;">'+escapeHtml(ca.name)+'</span><span style="color:var(--color-text-secondary);font-size:12px;">now</span>'+del+'</div>'
    +'<div style="font-size:13px;margin-top:2px;">'+escapeHtml(c.text)+'</div></div></div>';
}

function delComment(postId,cId) {
  var posts=getPosts();
  var p=posts.find(function(x){return x.id===postId;}); if(!p) return;
  p.comments=p.comments.filter(function(c){return !(c.id===cId&&c.authorId===ME.id);});
  savePosts(posts);
  var el=document.getElementById("cmt-"+cId); if(el) el.remove();
  var rc=document.getElementById("rc-"+postId); if(rc) rc.textContent=p.comments.length;
}

function delPost(postId) {
  if(!confirm("Delete this pulse?")) return;
  var posts=getPosts().filter(function(p){return !(p.id===postId&&p.authorId===ME.id);});
  savePosts(posts);
  var el=document.getElementById("post-"+postId); if(el) el.remove();
}

// ── Composer ────────────────────────────────────────────────
var cw=document.getElementById("composerWrap");
if(cw) {
  var selectedMs=null;
  cw.innerHTML=makeAv(ME,40)
    +'<div class="composer-body">'
    +'<textarea class="composer-input" id="pi" placeholder="What\'s your pulse today?" rows="1" maxlength="280"></textarea>'
    +'<div style="display:flex;gap:6px;flex-wrap:wrap;padding:6px 0;border-top:1px solid var(--color-border);margin-top:6px;">'
    +'<span style="font-size:11px;color:var(--color-text-secondary);align-self:center;">&#9203;</span>'
    +'<button class="xb" data-ms="" style="background:#8b5cf6;color:#fff;border:1px solid #8b5cf6;border-radius:9999px;padding:2px 10px;font-size:11px;cursor:pointer;font-weight:600;font-family:inherit;">Forever</button>'
    +'<button class="xb" data-ms="3600000" style="background:transparent;color:var(--color-text-secondary);border:1px solid var(--color-border);border-radius:9999px;padding:2px 10px;font-size:11px;cursor:pointer;font-weight:600;font-family:inherit;">1 hour</button>'
    +'<button class="xb" data-ms="86400000" style="background:transparent;color:var(--color-text-secondary);border:1px solid var(--color-border);border-radius:9999px;padding:2px 10px;font-size:11px;cursor:pointer;font-weight:600;font-family:inherit;">24 hours</button>'
    +'<button class="xb" data-ms="604800000" style="background:transparent;color:var(--color-text-secondary);border:1px solid var(--color-border);border-radius:9999px;padding:2px 10px;font-size:11px;cursor:pointer;font-weight:600;font-family:inherit;">7 days</button>'
    +'</div>'
    +'<div class="composer-actions"><div></div>'
    +'<div style="display:flex;align-items:center;gap:12px;">'
    +'<span id="cc" style="font-size:12px;color:var(--color-text-secondary);">280</span>'
    +'<button id="sb" class="composer-submit" disabled>Pulse it</button>'
    +'</div></div></div>';

  cw.querySelectorAll(".xb").forEach(function(b){
    b.addEventListener("click",function(){
      cw.querySelectorAll(".xb").forEach(function(x){x.style.background="transparent";x.style.color="var(--color-text-secondary)";x.style.borderColor="var(--color-border)";});
      b.style.background="#8b5cf6";b.style.color="#fff";b.style.borderColor="#8b5cf6";
      selectedMs=b.dataset.ms?parseInt(b.dataset.ms):null;
    });
  });

  var ta=document.getElementById("pi"),cc2=document.getElementById("cc"),sb=document.getElementById("sb");
  ta.addEventListener("input",function(){
    var l=280-ta.value.length;
    cc2.textContent=l;cc2.style.color=l<20?(l<0?"#ef4444":"#f59e0b"):"var(--color-text-secondary)";
    sb.disabled=!ta.value.trim()||l<0;
  });
  sb.addEventListener("click",function(){
    var txt=ta.value.trim(); if(!txt) return;
    var posts=getPosts();
    var now=Date.now();
    posts.unshift({id:"p_"+now,authorId:ME.id,content:txt,timestamp:now,expiresAt:selectedMs?now+selectedMs:null,vibes:{},comments:[]});
    savePosts(posts);
    ta.value="";cc2.textContent="280";sb.disabled=true;
    renderFeed(currentTab);
  });
}

// ── Feed render ──────────────────────────────────────────────
var currentTab="following";

function renderFeed(tab) {
  var el=document.getElementById("postsContainer"); if(!el) return;
  var now=Date.now();
  var allPosts=getPosts().filter(function(p){return !p.expiresAt||p.expiresAt>now;});

  var posts;
  if(tab==="discover") {
    posts=allPosts.sort(function(a,b){return b.timestamp-a.timestamp;});
  } else {
    var meUser=getUserById(ME.id)||ME;
    var vis=[ME.id].concat(meUser.following||[]);
    posts=allPosts.filter(function(p){return vis.indexOf(p.authorId)!==-1;}).sort(function(a,b){return b.timestamp-a.timestamp;});
  }

  if(!posts.length) {
    el.innerHTML='<div class="empty-state"><h3>'+(tab==="discover"?"No pulses yet ⚡":"Nothing here yet")+'</h3><p>'+(tab==="discover"?"Be first to pulse!":"Switch to Discover to find people.")+'</p></div>';
    return;
  }
  el.innerHTML=posts.map(renderPost).join("");
}

document.getElementById("tabA").addEventListener("click",function(e){
  e.preventDefault(); currentTab="following";
  document.getElementById("tabA").classList.add("active");
  document.getElementById("tabB").classList.remove("active");
  renderFeed("following");
});
document.getElementById("tabB").addEventListener("click",function(e){
  e.preventDefault(); currentTab="discover";
  document.getElementById("tabB").classList.add("active");
  document.getElementById("tabA").classList.remove("active");
  renderFeed("discover");
});

// ── Right sidebar ────────────────────────────────────────────
function renderRight() {
  var el=document.getElementById("rightPanel"); if(!el) return;
  var meUser=getUserById(ME.id)||ME;
  var myF=meUser.following||[];
  var sugg=getUsers().filter(function(u){return u.id!==ME.id&&myF.indexOf(u.id)===-1;}).slice(0,5);

  var rows=sugg.map(function(u){
    var bg=avatarGrad(u.id);
    return '<div class="follow-item" id="sr-'+u.id+'">'
      +'<div class="follow-avatar" style="background:'+bg+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;color:#fff;border-radius:50%;">'+u.name[0].toUpperCase()+'</div>'
      +'<div class="follow-info"><a href="profile.html?id='+u.id+'" class="follow-name">'+escapeHtml(u.name)+'</a>'
      +'<div class="follow-handle">@'+escapeHtml(u.username)+'</div></div>'
      +'<button class="btn-follow" data-uid="'+u.id+'">Follow</button></div>';
  }).join("");

  el.innerHTML=
    '<div class="search-box"><div class="search-input-wrapper">'
    +'<svg viewBox="0 0 24 24" style="position:absolute;left:16px;width:16px;height:16px;fill:var(--color-text-secondary);pointer-events:none"><path d="M10.25 3.75c-3.59 0-6.5 2.91-6.5 6.5s2.91 6.5 6.5 6.5c1.795 0 3.419-.726 4.596-1.904 1.178-1.177 1.904-2.801 1.904-4.596 0-3.59-2.91-6.5-6.5-6.5zm-8.5 6.5c0-4.694 3.806-8.5 8.5-8.5s8.5 3.806 8.5 8.5c0 1.986-.682 3.815-1.824 5.262l4.781 4.781-1.414 1.414-4.781-4.781c-1.447 1.142-3.276 1.824-5.262 1.824-4.694 0-8.5-3.806-8.5-8.5z"/></svg>'
    +'<input class="search-input" id="si" placeholder="Search people &amp; posts"/>'
    +'</div></div>'
    +'<div id="sp"></div>'
    +'<div class="sidebar-box" id="wb"><div class="sidebar-box-header">Who to follow</div>'
    +(rows||'<p style="padding:12px 16px;font-size:13px;color:var(--color-text-secondary);">Following everyone!</p>')
    +'</div>'
    +'<div class="right-footer"><div class="right-footer-links"><span>Terms</span><span>Privacy</span><span>&#169; 2026 Asteria</span></div></div>';

  el.querySelectorAll(".btn-follow[data-uid]").forEach(function(btn){
    btn.addEventListener("click",function(){
      var uid=btn.dataset.uid;
      var users=getUsers();
      var mu=users.find(function(u){return u.id===ME.id;});
      if(mu){if(mu.following.indexOf(uid)===-1)mu.following.push(uid);saveUsers(users);}
      var row=document.getElementById("sr-"+uid); if(row) row.remove();
      renderFeed(currentTab);
    });
  });

  var si=document.getElementById("si");
  var sp=document.getElementById("sp");
  var wb=document.getElementById("wb");
  si.addEventListener("input",function(){
    var q=si.value.trim().toLowerCase();
    if(!q){sp.innerHTML="";wb.style.display="block";renderFeed(currentTab);return;}
    wb.style.display="none";
    var mu=getUsers().filter(function(u){return u.name.toLowerCase().includes(q)||u.username.toLowerCase().includes(q);}).slice(0,5);
    sp.innerHTML=mu.length?'<div class="sidebar-box" style="margin-bottom:12px;"><div class="sidebar-box-header" style="font-size:14px;">People</div>'
      +mu.map(function(u){
        var bg=avatarGrad(u.id);
        return '<a href="profile.html?id='+u.id+'" style="display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--color-border);text-decoration:none;" onmouseover="this.style.background=\'var(--color-bg-hover)\'" onmouseout="this.style.background=\'transparent\'">'
          +'<div style="width:36px;height:36px;border-radius:50%;background:'+bg+';display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;color:#fff;">'+u.name[0].toUpperCase()+'</div>'
          +'<div><div style="font-weight:700;font-size:13px;color:var(--color-text-primary);">'+escapeHtml(u.name)+'</div>'
          +'<div style="font-size:12px;color:var(--color-text-secondary);">@'+escapeHtml(u.username)+'</div></div></a>';
      }).join('')+'</div>':'';
    var mp=getPosts().filter(function(p){
      var a=getUserById(p.authorId)||{};
      return p.content.toLowerCase().includes(q)||(a.name||"").toLowerCase().includes(q)||(a.username||"").toLowerCase().includes(q);
    }).sort(function(a,b){return b.timestamp-a.timestamp;});
    var fe=document.getElementById("postsContainer");
    if(fe) fe.innerHTML=mp.length?mp.map(renderPost).join(""):'<div class="empty-state"><h3>No results</h3></div>';
  });
}

// ── Init ─────────────────────────────────────────────────────
renderFeed("following");
renderRight();
</script>
</body>
</html>
