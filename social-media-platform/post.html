<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post / Pulse</title>
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
  </head>
  <body>
    <div class="app-shell">

      <header class="sidebar" id="appSidebar"></header>

      <main class="main-content">
        <div class="main-header">
          <div class="header-row">
            <a href="javascript:history.back()" class="back-btn">
              <svg viewBox="0 0 24 24"><path d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"/></svg>
            </a>
            <div class="main-header-title"><h2>Post</h2></div>
          </div>
        </div>

        <!-- Post detail — built by postview.js -->
        <div id="postDetailArea"></div>

        <!-- Reply composer -->
        <div class="composer" id="replyComposerWrap" style="display:none"></div>

        <!-- Replies -->
        <div id="repliesContainer"></div>
      </main>

      <aside class="right-sidebar">
        <div class="sidebar-box" style="margin-top:12px">
          <div class="sidebar-box-header">Trends for you</div>
          <div class="trend-item"><div class="trend-category">Technology · Trending</div><div class="trend-name">#WebDev</div><div class="trend-count">52.1K posts</div></div>
          <div class="trend-item"><div class="trend-category">Technology · Trending</div><div class="trend-name">#JavaScript</div><div class="trend-count">128K posts</div></div>
          <div class="trend-item"><div class="trend-category">Design · Trending</div><div class="trend-name">#UXDesign</div><div class="trend-count">34.7K posts</div></div>
          <div class="sidebar-box-footer"><span>Use search to discover more</span></div>
        </div>
      </aside>

    </div>
    <script src="assets/js/config.js?v=9"></script>
    <script src="assets/js/storage.js?v=9"></script>
    <script src="assets/js/seed.js?v=9"></script>
    <script src="assets/js/ui.js?v=9"></script>
    <script src="assets/js/postview.js?v=9"></script>
    <script>
      // Build reply composer once postview.js has loaded
      const me2 = getCurrentUser();
      if (me2) {
        const bg = avatarGradient(me2.id);
        document.getElementById("replyComposerWrap").innerHTML = `
          <div class="composer-avatar" style="background:${bg}"></div>
          <div class="composer-body">
            <textarea class="composer-input" id="replyInput" placeholder="Post your reply" rows="1" maxlength="280"></textarea>
            <div class="composer-actions">
              <div></div>
              <button type="button" class="composer-submit" id="submitReply">Reply</button>
            </div>
          </div>`;
      }
    </script>
  </body>
</html>
