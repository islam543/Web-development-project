<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Profile / X</title>
    <link rel="stylesheet" href="assets/css/base.css" />
    <link rel="stylesheet" href="assets/css/layout.css" />
    <link rel="stylesheet" href="assets/css/components.css" />
    <link rel="stylesheet" href="assets/css/responsive.css" />
  </head>
  <body>
    <div class="app-shell">
 
      <header class="sidebar" id="appSidebar"></header>
 
      <main class="main-content">
        <!-- Header -->
        <div class="main-header">
          <div class="header-row">
            <a href="feed.html" class="back-btn">
              <svg viewBox="0 0 24 24"><path d="M7.414 13l5.043 5.04-1.414 1.42L3.586 12l7.457-7.46 1.414 1.42L7.414 11H21v2H7.414z"/></svg>
            </a>
            <div class="main-header-title">
              <h2 id="headerName">Profile</h2>
              <p id="headerPostCount"></p>
            </div>
          </div>
        </div>
 
        <!-- Banner -->
        <div class="profile-banner" style="background:linear-gradient(135deg,#1d4ed8,#1d9bf0,#06b6d4)"></div>
 
        <!-- Profile info — built by profile.js -->
        <div class="profile-header" id="profileHeader"></div>
 
        <!-- Edit form (own profile) -->
        <section id="editSection" style="display:none;padding:16px;border-bottom:1px solid var(--color-border)">
          <h3 style="font-size:17px;font-weight:700;margin-bottom:16px">Edit profile</h3>
          <form id="editForm" class="auth-form" novalidate style="gap:0">
            <div class="form-group">
              <input type="text" id="editName" class="form-input" placeholder=" " required/>
              <label for="editName" class="form-label">Name</label>
            </div>
            <div class="form-group" style="margin-top:16px">
              <textarea id="editBio" class="form-input" placeholder="Bio (optional)" rows="3"
                style="resize:vertical;padding-top:26px;min-height:80px;"></textarea>
            </div>
            <div class="form-group" style="margin-top:16px">
              <input type="password" id="editPassword" class="form-input" placeholder=" "/>
              <label for="editPassword" class="form-label">New password (optional)</label>
            </div>
            <div style="display:flex;gap:8px;margin-top:16px;">
              <button type="submit" class="btn btn-primary btn-sm">Save</button>
              <button type="button" class="btn btn-outline btn-sm" id="cancelEditBtn">Cancel</button>
            </div>
          </form>
        </section>
 
        <!-- Tabs -->
        <div class="tab-bar">
          <a href="#" class="tab-item active">Posts</a>
          <a href="#" class="tab-item">Replies</a>
          <a href="#" class="tab-item">Likes</a>
        </div>
 
        <!-- Posts -->
        <div id="profilePosts"></div>
      </main>
 
      <aside class="right-sidebar" id="rightPanel"></aside>
 
    </div>
    <script src="assets/js/config.js"></script>
    <script src="assets/js/storage.js"></script>
    <script src="assets/js/ui.js"></script>
    <script src="assets/js/profile.js"></script>
  </body>
</html>
